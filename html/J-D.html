<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style/J-D.css">
    <title>UFC GAME</title>
</head>
<body>
    <header>
        <div class="block-head">
            <div class="block-head-inside">
                <div class="block-left">
                    <img width="90" height="85" src="/img/ufc_PNG63.png" alt="">
                </div>
                <div class="block-center">
                    <a href="/index.html">
                        <img width="300" height="100" src="/img/UFC-Logo.png" alt="">
                    </a>
                </div>
                <div class="block-right">
                    <img width="90" height="85" src="/img/ufc_PNG63.png" alt="">
                </div>
            </div>
        </div>
    </header>
    <main>
        <div id="round"></div>
        <div class="main-block">
            <div class="sub-block">
                <div class="john-jhons">
                    <div class="buttonJohn">
                        <button onclick="lhookJohn();">Left Hook
                        Q</button>
                        <button onclick="rhookJohn();">Right Hook E</button>
                        <button onclick="mkickJohn();">Middle Kick W</button>
                        <button onclick="hkickJohn();">High Kick 2</button>
                        <button onclick="lkickJohn();">Low Kick A</button>
                        <button id="superJohn" onclick="superJohn();">Super Punch D</button>
                    
                    </div>
                    <table id="john-stats"></table>
                    <div class="john">
                        <img width="300" height="400" src="/img/john.png" alt="">
                    </div>
                </div>
                <button onclick="res();" >Reset</button>
                <div class="daniel-cormier">
                    <div class="buttonDaniel">
                        <button onclick="lhookDan();">Left Hook I</button>
                        <button onclick="rJabDan();">Right Jab P</button>
                        <button onclick="lkickDan();">Low Kick L</button>
                        <button onclick="takeDan();">Takedown O</button>
                        <button id="superDan" onclick="touchngo();">Touch n Go K</button>
                        <button onclick="highCrotch();">High Crotch U</button>
                    </div>
                    <table id="daniel-stats"></table>
                    <img width="300" height="400" src="/img/imgonline-com-ua-Mirror-yaXkjAQq144PxO.png" alt="">
                </div>
            </div>
        </div>
    </main>
    <footer>
        
    </footer>
    <script src="/js/script.js"></script>
</body>
</html>
